function showPage(pageId) {

window.submitNewTier = function() {
  var name = document.getElementById('tier-name').value.trim();
  var points = parseInt(document.getElementById('tier-points').value) || 0;
  if (!name) { showToast('请填写等级名称', 'error'); return; }
  var selectedIcon = document.querySelector('.tier-icon-opt[style*="border-color: rgb(24, 144, 255)"]');
  var icon = selectedIcon ? selectedIcon.textContent : '⭐';
  var newTier = {
    id:'tier_new_' + Date.now(),
    name: name,
    icon: icon,
    color: '#1890ff',
    minPoints: points,
    discount: document.getElementById('tier-discount').value,
    freeBreakfast: document.getElementById('tier-breakfast').checked,
    lateCheckout: document.getElementById('tier-checkout').checked,
    prioritySupport: document.getElementById('tier-priority').checked,
    monthlyLimit: parseInt(document.getElementById('tier-monthly').value) || 0,
    desc: document.getElementById('tier-desc').value.trim() || '新增会员等级'
  };
  memberTiers.push(newTier);
  document.getElementById('modal-add-tier') && document.getElementById('modal-add-tier').remove();
  showToast('✅ 会员等级 "' + name + '" 已创建（需 ' + points.toLocaleString() + ' 积分）', 'success');
  openMemberTierManagement();
};

window.exportEnergyTrendCSV = function() {
  var csv = '日期,用电量(kWh),温度(°C)\n';
  ['3/22','3/23','3/24','3/25','3/26','3/27','3/28'].forEach(function(d,i) {
    csv += d + ',' + [6.2,7.8,5.4,8.1,7.3,6.9,5.8][i] + ',' + [22,24,23,25,24,23,24][i] + '\n';
  });
  var blob = new Blob(['\ufeff' + csv], {type:'text/csv;charset=utf-8'});
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url; a.download = '能耗趋势_' + new Date().toISOString().slice(0,10) + '.csv';
  a.click(); URL.revokeObjectURL(url);
  showToast('📤 能耗趋势CSV已导出', 'success');
};

};
</script>

window.updateFaultPriority = function() {
  var sel = document.getElementById('fault-type-select');
  if (!sel) return;
  var typeMap = {lock_stuck:'urgent', battery_low:'high', offline:'high', signal_weak:'normal', firmware_error:'normal', other:'normal'};
  var priority = typeMap[sel.value] || 'normal';
  var prioritySel = document.getElementById('fault-priority-select');
  if (prioritySel) prioritySel.value = priority;
};

window.saveFaultDraft = function() {
  var draft = {
    type: document.getElementById('fault-type-select') ? document.getElementById('fault-type-select').value : '',
    title: document.getElementById('fault-wo-title') ? document.getElementById('fault-wo-title').value : '',
    desc: document.getElementById('fault-wo-desc') ? document.getElementById('fault-wo-desc').value : ''
  };
  localStorage.setItem('faultDraft', JSON.stringify(draft));
  showToast('📁 故障工单草稿已保存', 'info');
};

window.submitFaultWorkorder = function(uuid, roomNum) {
  var title = document.getElementById('fault-wo-title').value.trim();
  var desc = document.getElementById('fault-wo-desc') ? document.getElementById('fault-wo-desc').value.trim() : '';
  var priority = document.getElementById('fault-priority-select') ? document.getElementById('fault-priority-select').value : 'normal';
  if (!title) { showToast('请填写工单标题', 'error'); return; }
  var woId = 'WO-' + new Date().toISOString().slice(0,10).replace(/-/g,'') + '-' + Math.random().toString(36).slice(2,6).toUpperCase();
  document.getElementById('modal-fault-wo') && document.getElementById('modal-fault-wo').remove();
  showToast('🛠️ 工单 ' + woId + ' 已创建（优先级：' + priority + '）', 'success');
  // Navigate to workorder page
  showPage('page-workorder');
  // Try to find and highlight the new workorder
  setTimeout(function() {
    showToast('📋 已跳转至服务工单页面', 'info');
  }, 500);
};
</script>

        '<div class="form-group"><label class="form-label">设备UUID</label><input type="text" id="ul-uuid" class="form-input" placeholder="输入设备UUID（可模糊）"></div>' +

window.toggleTimeCustom = function() {
  var sel = document.getElementById('ul-time-range');
  if (!sel) return;

};

window.applyUnlockFilterAndClose = function() {
  document.getElementById('modal-unlock-filter') && document.getElementById('modal-unlock-filter').remove();
  showToast('🔍 筛选条件已应用', 'info');
};

window.applyUnlockFilterAndShowResults = function() {
  var startDate = document.getElementById('ul-start-date') ? document.getElementById('ul-start-date').value : '';
  var endDate = document.getElementById('ul-end-date') ? document.getElementById('ul-end-date').value : '';
  var room = document.getElementById('ul-room') ? document.getElementById('ul-room').value.trim() : '';
  var method = document.getElementById('ul-method') ? document.getElementById('ul-method').value : '';
  var result = document.getElementById('ul-result') ? document.getElementById('ul-result').value : '';
  var operator = document.getElementById('ul-operator') ? document.getElementById('ul-operator').value.trim() : '';
  var sort = document.getElementById('ul-sort') ? document.getElementById('ul-sort').value : 'desc';
  document.getElementById('modal-unlock-filter') && document.getElementById('modal-unlock-filter').remove();
  // Simulate filtering
  var summary = '筛选结果：共找到 <strong>47</strong> 条记录';
  if (room) summary += '（房间：' + room + '）';
  if (method) summary += '（方式：' + method + '）';
  showToast('🔍 ' + summary, 'success');
  // Try to find the unlock log table and update it
  var logTable = document.getElementById('unlock-log-table');
  if (logTable) {
    var rows = logTable.querySelectorAll('tbody tr');
    var shown = 0;
    rows.forEach(function(row) {
      var text = row.textContent.toLowerCase();
      var match = true;
      if (room && text.indexOf(room.toLowerCase()) === -1) match = false;
      if (operator && text.indexOf(operator.toLowerCase()) === -1) match = false;
      row.style.display = match ? '' : 'none';
      if (match) shown++;
    });
    var countEl = document.getElementById('unlock-result-count');
    if (countEl) countEl.textContent = shown + ' 条';
  }
};

window.resetUnlockFilter = function() {
  var inputs = ['ul-start-date','ul-end-date','ul-room','ul-operator','ul-uuid'];
  inputs.forEach(function(id) {
    var el = document.getElementById(id);
    if (el) { if (el.tagName === 'INPUT') el.value = ''; }
  });
  var selects = ['ul-method','ul-result','ul-time-range','ul-sort'];
  selects.forEach(function(id) {
    var el = document.getElementById(id);
    if (el) el.value = id === 'ul-sort' ? 'desc' : '';
  });
  showToast('🔄 筛选条件已重置', 'info');
};

window.exportUnlockLogCSV = function() {
  var csv = '\ufeff开锁时间,房间号,开锁方式,开锁人,结果,响应时间,电量\n';
  var records = [
    ['2026-03-28 14:32:15','301','📱 手机开锁','张三','成功','156ms','88%'],
    ['2026-03-28 13:45:22','302','🔑 密码开锁','李四','成功','203ms','75%'],
    ['2026-03-28 12:10:05','305','🪪 门卡开锁','钱七','成功','98ms','28%'],
    ['2026-03-28 11:30:00','201','📱 手机开锁','王五','成功','145ms','92%'],
    ['2026-03-28 10:15:33','303','👆 指纹开锁','孙三','失败','--','离线'],
  ];
  records.forEach(function(r){ csv += r.join(',') + '\n'; });
  var blob = new Blob([csv], {type:'text/csv;charset=utf-8'});
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url; a.download = '开锁记录_' + new Date().toISOString().slice(0,10) + '.csv';
  a.click(); URL.revokeObjectURL(url);
  showToast('📤 开锁记录CSV已导出（' + records.length + '条）', 'success');
};
</script>
